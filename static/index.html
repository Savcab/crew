<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>crew</title>
<!-- xterm.css first (vendor), then our palette/layout. Both served from /static/*.
     No CDN, no build step. -->
<link rel="stylesheet" href="/static/vendor/xterm.css">
<link rel="stylesheet" href="/static/app.css">
<!-- xterm.js + the fit addon load as CLASSIC scripts BEFORE the module so their
     globals (window.Terminal / window.FitAddon) exist when term.js reads them. -->
<script src="/static/vendor/xterm.js"></script>
<script src="/static/vendor/addon-fit.js"></script>
<script type="module" src="/static/js/main.js"></script>
</head>
<body>
<header>
 <h1>crew</h1>
 <span class="meta" id="meta"></span>
 <label style="margin-left:auto">refresh <select id="rate">
   <option value="1500" selected>1.5s</option>
   <option value="1000">1s</option>
   <option value="3000">3s</option>
   <option value="0">off</option></select></label>
</header>
<div id="main">
 <!-- ===== CREW: the agent graph + the docked agent terminal ===== -->
 <div id="crew" class="view on">
   <div id="crew-top">
     <div id="cgraph-wrap">
       <div id="cgraph-head">
         <span class="t">Crew graph</span>
         <span class="meta" id="cgraph-meta"></span>
         <span class="ghint" style="margin-left:auto">drag <b class="hdot">●</b> onto another agent to connect · click a node to open its terminal</span>
         <span class="zoomctl" title="zoom the graph (Ctrl/Cmd +  /  Ctrl/Cmd −) · drag empty space to pan · Ctrl/Cmd 0 or Fit to frame all">
           <button class="btn sm" id="zoomOut" aria-label="zoom out">−</button>
           <span class="meta" id="zoomPct">100%</span>
           <button class="btn sm" id="zoomIn" aria-label="zoom in">+</button>
           <button class="btn sm" id="zoomFit" aria-label="zoom to fit">⊡ fit</button>
         </span>
         <button class="btn primary sm" id="addAgentBtn" style="margin-left:12px">+ Agent</button>
       </div>
       <div id="cgraph"></div>
     </div>
   </div>
   <!-- agent terminal dock — full-width bottom band; opens on agent click. ONE
        terminal = a real `tmux attach` to that agent's claude window, so tmux's own
        windows/splits work inside it (Ctrl-b c / " / % / n). -->
   <div id="dock">
     <div id="dockResize" title="drag to resize"></div>
     <div id="dock-head">
       <span class="dot" id="dockDot"></span>
       <span id="dockName">agent</span>
       <span class="meta" id="dockMeta"></span>
       <button class="btn sm" id="dockPrev" style="margin-left:auto" title="previous agent">‹</button>
       <button class="btn sm" id="dockNext" title="next agent">›</button>
       <button class="btn sm" id="dockMax" title="maximize / restore">⤢</button>
       <button class="btn sm" id="dockClose">✕ close</button>
     </div>
     <span id="dockLiveBadge">⌨ keys → this terminal · Ctrl+Esc to detach</span>
     <div id="dockPanes">
       <div id="dockTerm" class="dockpane"></div>
     </div>
     <!-- kickoff bar: the USER seeding/steering this agent directly (not peer mail) -->
     <div id="dockSay">
       <input id="dockSayInput" placeholder="message this agent (you → agent · Enter to send)…">
       <button class="btn sm primary" id="dockSayBtn">send ⏎</button>
     </div>
   </div>
 </div>
</div>
<!-- ===== FORM MODAL (create agent / describe edge / edit edge) ===== -->
<div id="cmodal"><div class="modal-box">
  <div class="modal-head"><span id="modalTitle" style="font-weight:bold"></span>
    <button class="x" id="modalClose">×</button></div>
  <div class="modal-body" id="modalBody"></div>
</div></div>
<div class="toast" id="toast"></div>
</body>
</html>
